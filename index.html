<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imobiliárias — Plano Expansão 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0a0e1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--primary:#0033A0;--accent:#AAFF00;--accent2:#88cc00;--text:#e2e8f0;--muted:#94a3b8;--red:#ef4444;--green:#22c55e;--orange:#f59e0b;--blue:#3b82f6}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  
  /* Header */
  .header{background:linear-gradient(135deg,#0033A0 0%,#001a5c 100%);padding:28px 32px;border-bottom:3px solid var(--accent)}
  .header h1{font-size:1.6rem;font-weight:800;letter-spacing:-.5px}
  .header h1 span{color:var(--accent)}
  .header p{color:#94a3b8;font-size:.85rem;margin-top:4px}
  
  /* Stats Bar */
  .stats-bar{display:flex;gap:16px;padding:16px 32px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .stat{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--card2);border-radius:8px;border:1px solid var(--border)}
  .stat .num{font-size:1.3rem;font-weight:800;color:var(--accent)}
  .stat .label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat.green .num{color:var(--green)}
  .stat.orange .num{color:var(--orange)}
  .stat.blue .num{color:var(--blue)}

  /* Filters */
  .filters{display:flex;gap:12px;padding:16px 32px;background:var(--bg);flex-wrap:wrap;align-items:center}
  .filter-group{display:flex;flex-direction:column;gap:4px}
  .filter-group label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .filter-group select, .filter-group input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:.85rem;font-family:inherit}
  .filter-group select:focus, .filter-group input:focus{outline:none;border-color:var(--accent)}
  .btn{padding:8px 18px;border-radius:6px;border:none;font-family:inherit;font-weight:600;cursor:pointer;font-size:.85rem;transition:.2s}
  .btn-accent{background:var(--accent);color:#000}
  .btn-accent:hover{background:var(--accent2)}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent)}
  .btn-export{background:var(--green);color:#000}
  .btn-export:hover{background:#16a34a;color:#fff}

  /* Main grid */
  .container{padding:16px 32px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:16px}
  
  /* City Card */
  .city-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.2s}
  .city-card:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(170,255,0,.08)}
  .city-card.researched{border-left:4px solid var(--green)}
  .city-card.researched .card-status{color:var(--green)}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px 10px;background:var(--card2)}
  .card-head .city-name{font-size:1.05rem;font-weight:700}
  .card-head .city-uf{color:var(--accent);font-weight:800;font-size:.85rem}
  .card-head .regional{font-size:.75rem;color:var(--muted);margin-top:2px}
  .card-status{font-size:.7rem;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.05);color:var(--muted);font-weight:600;white-space:nowrap}
  
  .card-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;padding:0 16px;margin:10px 0}
  .metric{text-align:center;padding:6px 0}
  .metric .mv{font-size:1rem;font-weight:700;color:var(--accent)}
  .metric .ml{font-size:.65rem;color:var(--muted);text-transform:uppercase}
  
  .card-actions{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap}
  .card-actions .btn{font-size:.78rem;padding:6px 14px;flex:1;text-align:center;text-decoration:none;min-width:fit-content}
  .btn-google{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
  .btn-google:hover{background:rgba(59,130,246,.3)}
  .btn-maps{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3)}
  .btn-maps:hover{background:rgba(34,197,94,.25)}
  .btn-olx{background:rgba(245,158,11,.12);color:var(--orange);border:1px solid rgba(245,158,11,.3)}
  .btn-olx:hover{background:rgba(245,158,11,.25)}
  .btn-bank{background:rgba(168,85,247,.12);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
  .btn-bank:hover{background:rgba(168,85,247,.25)}

  /* Bank count section */
  .bank-section{display:flex;align-items:center;gap:10px;padding:6px 16px 4px;flex-wrap:wrap}
  .bank-section label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  .bank-section input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:.85rem;font-family:inherit;width:60px;text-align:center}
  .bank-section input:focus{outline:none;border-color:#a855f7}
  .bank-section .bank-val{font-size:1rem;font-weight:700;color:#a855f7}

  /* Imobiliária entries */
  .imob-section{padding:8px 16px 14px}
  .imob-section h4{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .imob-entry{display:grid;grid-template-columns:1fr 140px 32px;gap:6px;margin-bottom:6px;align-items:center}
  .imob-entry input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:.82rem;font-family:inherit}
  .imob-entry input:focus{outline:none;border-color:var(--accent)}
  .imob-entry input::placeholder{color:#475569}
  .imob-entry .del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:1.1rem;padding:4px;border-radius:4px}
  .imob-entry .del-btn:hover{background:rgba(239,68,68,.15)}
  .add-imob{font-size:.78rem;color:var(--accent);background:none;border:1px dashed rgba(170,255,0,.3);padding:6px;border-radius:6px;cursor:pointer;width:100%;font-family:inherit}
  .add-imob:hover{background:rgba(170,255,0,.05);border-color:var(--accent)}

  /* Lote badge */
  .lote-badge{font-size:.65rem;padding:2px 8px;border-radius:10px;font-weight:700;background:rgba(170,255,0,.1);color:var(--accent);margin-left:6px}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#000;padding:12px 24px;border-radius:8px;font-weight:600;font-size:.9rem;opacity:0;transform:translateY(20px);transition:.3s;z-index:999;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}

  /* Summary export panel */
  .export-panel{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:2px solid var(--accent);padding:12px 32px;display:flex;align-items:center;justify-content:space-between;z-index:100}
  .export-panel .info{font-size:.85rem;color:var(--muted)}
  .export-panel .info strong{color:var(--accent)}

  /* Responsive */
  @media(max-width:900px){
    .grid{grid-template-columns:1fr}
    .filters,.stats-bar,.container{padding-left:16px;padding-right:16px}
  }
</style>
</head>

<div class="header">
  <h1>🏢 Imobiliárias — <span>Plano Expansão 2026</span></h1>
  <p>Pesquisa de imobiliárias por município · 120 cidades · Fonte: Plano Expansão 2026_RH</p>
</div>

</div>

<div class="container">

</div>
<div id="container-mapa" style="display: none; width: 80%; height: 80vh; padding: 16px 32px;">

// State: imobiliárias por cidade (keyed by IBGE)
let imobData = {};
try { imobData = JSON.parse(localStorage.getItem('imob_expansao_2026') || '{}'); } catch(e){}

// State: quantidade de bancos por cidade (keyed by IBGE)
let bankData = {};
try { bankData = JSON.parse(localStorage.getItem('bank_expansao_2026') || '{}'); } catch(e){}

function saveState() {
  localStorage.setItem('imob_expansao_2026', JSON.stringify(imobData));
  localStorage.setItem('bank_expansao_2026', JSON.stringify(bankData));
  updateStats();
}

function titleCase(s) {
  return s.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function formatNum(n) {
  return n.toLocaleString('pt-BR');
}

function googleSearchURL(city, uf) {
  const q = encodeURIComponent(`imobiliárias em ${titleCase(city)} ${uf} telefone`);
  return `https://www.google.com/search?q=${q}`;
}

function googleMapsURL(city, uf) {
  const q = encodeURIComponent(`imobiliárias ${titleCase(city)} ${uf}`);
  return `https://www.google.com/maps/search/${q}`;
}

function olxURL(city, uf) {
  const q = encodeURIComponent(`${titleCase(city)} ${uf}`);
  return `https://www.google.com/search?q=imobili%C3%A1rias+${q}+aluguel+comercial`;
}

function bankSearchURL(city, uf) {
  const q = encodeURIComponent(`bancos agências bancárias em ${titleCase(city)} ${uf}`);
  return `https://www.google.com/search?q=${q}`;
}

function bankMapsURL(city, uf) {
  const q = encodeURIComponent(`bancos ${titleCase(city)} ${uf}`);
  return `https://www.google.com/maps/search/${q}`;
}

function updateBankCount(ibge, value) {
  const num = parseInt(value) || 0;
  if (num > 0) bankData[ibge] = num;
  else delete bankData[ibge];
  saveState();
}

function getImobs(ibge) {
  return imobData[ibge] || [];
}

function addImob(ibge) {
  if (!imobData[ibge]) imobData[ibge] = [];
  imobData[ibge].push({ nome: '', telefone: '' });
  saveState();
  renderCards();
}

function removeImob(ibge, idx) {
  if (imobData[ibge]) {
    imobData[ibge].splice(idx, 1);
    if (imobData[ibge].length === 0) delete imobData[ibge];
    saveState();
    renderCards();
  }
}

function updateImob(ibge, idx, field, value) {
  if (!imobData[ibge]) imobData[ibge] = [];
  if (!imobData[ibge][idx]) imobData[ibge][idx] = { nome: '', telefone: '' };
  imobData[ibge][idx][field] = value;
  saveState();
  // Update card status without full re-render
  const card = document.querySelector(`[data-ibge="${ibge}"]`);
  if (card) {
    const hasData = (imobData[ibge] || []).some(i => i.nome.trim() || i.telefone.trim());
    card.classList.toggle('researched', hasData);
    const statusEl = card.querySelector('.card-status');
    if (statusEl) statusEl.textContent = hasData ? '✓ Pesquisado' : 'Pendente';
  }
}

function updateStats() {
  let pesquisados = 0, totalImobs = 0;
  DATA.forEach(d => {
    const imobs = getImobs(d.ibge);
    const hasData = imobs.some(i => i.nome.trim() || i.telefone.trim());
    if (hasData) pesquisados++;
    totalImobs += imobs.filter(i => i.nome.trim()).length;
  });
  let totalBancos = 0;
  Object.values(bankData).forEach(v => totalBancos += (parseInt(v) || 0));
  document.getElementById('pesquisados').textContent = pesquisados;
  document.getElementById('pendentes').textContent = DATA.length - pesquisados;
  document.getElementById('totalImobs').textContent = totalImobs;
  document.getElementById('imobCount').textContent = totalImobs;
  document.getElementById('totalBancos').textContent = totalBancos;
}

function getFilteredData() {
  const search = document.getElementById('searchCity').value.toLowerCase();
  const uf = document.getElementById('filterUF').value;
  const regional = document.getElementById('filterRegional').value;
  const re = document.getElementById('filterRE').value;
  const lote = document.getElementById('filterLote').value;
  const status = document.getElementById('filterStatus').value;
  
  return DATA.filter(d => {
    if (search && !d.municipio.toLowerCase().includes(search)) return false;
    if (uf && d.uf !== uf) return false;
    if (regional && d.regional !== regional) return false;
    if (re && d.re !== re) return false;
    if (lote && d.lote !== lote) return false;
    if (status) {
      const hasData = (imobData[d.ibge] || []).some(i => i.nome.trim() || i.telefone.trim());
      if (status === 'pesquisado' && !hasData) return false;
      if (status === 'pendente' && hasData) return false;
    }
    return true;
  });
}

function renderCards() {
  const filtered = getFilteredData();
  const grid = document.getElementById('grid');
  document.getElementById('showCount').textContent = filtered.length;
  
  grid.innerHTML = filtered.map(d => {
    const imobs = getImobs(d.ibge);
    const hasData = imobs.some(i => i.nome.trim() || i.telefone.trim());
    const cityTitle = titleCase(d.municipio);
    
    return `
    <div class="city-card ${hasData ? 'researched' : ''}" data-ibge="${d.ibge}">
      <div class="card-head">
        <div>
          <div class="city-name">${cityTitle} <span class="city-uf">${d.uf}</span> <span class="lote-badge">Lote ${d.lote}</span></div>
          <div class="regional">${d.regional}${d.coord ? ' · ' + d.coord : ''} · RE ${d.re} · Leilão ${d.leilao}</div>
        </div>
        <div class="card-status">${hasData ? '✓ Pesquisado' : 'Pendente'}</div>
      </div>
      <div class="card-metrics">
        <div class="metric"><div class="mv">${formatNum(d.pop)}</div><div class="ml">População</div></div>
        <div class="metric"><div class="mv">${formatNum(d.inss)}</div><div class="ml">INSS</div></div>
        <div class="metric"><div class="mv">${formatNum(d.clt)}</div><div class="ml">CLT</div></div>
        <div class="metric"><div class="mv">${formatNum(d.publico)}</div><div class="ml">Público</div></div>
      </div>
      <div class="card-actions">
        <a class="btn btn-google" href="${googleSearchURL(d.municipio, d.uf)}" target="_blank" rel="noopener">🔍 Google</a>
        <a class="btn btn-maps" href="${googleMapsURL(d.municipio, d.uf)}" target="_blank" rel="noopener">📍 Maps</a>
        <a class="btn btn-olx" href="${olxURL(d.municipio, d.uf)}" target="_blank" rel="noopener">🏠 Comercial</a>
        <a class="btn btn-bank" href="${bankSearchURL(d.municipio, d.uf)}" target="_blank" rel="noopener">🏦 Bancos</a>
        <a class="btn btn-bank" href="${bankMapsURL(d.municipio, d.uf)}" target="_blank" rel="noopener">📍 Bancos Maps</a>
      </div>
      <div class="bank-section">
        <label>🏦 Qtd Bancos:</label>
        <input type="number" min="0" placeholder="0" value="${bankData[d.ibge] || ''}" 
          onchange="updateBankCount('${d.ibge}',this.value)">
        <span class="bank-val">${bankData[d.ibge] ? bankData[d.ibge] + ' banco(s)' : ''}</span>
      </div>
      <div class="imob-section">
        <h4>🏢 Imobiliárias Encontradas (${imobs.filter(i=>i.nome.trim()).length})</h4>
        ${imobs.map((im, idx) => `
          <div class="imob-entry">
            <input type="text" placeholder="Nome da imobiliária" value="${escapeHtml(im.nome)}" 
              oninput="updateImob('${d.ibge}',${idx},'nome',this.value)">
            <input type="text" placeholder="(99) 99999-9999" value="${escapeHtml(im.telefone)}"
              oninput="updateImob('${d.ibge}',${idx},'telefone',this.value)">
            <button class="del-btn" onclick="removeImob('${d.ibge}',${idx})">✕</button>
          </div>
        `).join('')}
        <button class="add-imob" onclick="addImob('${d.ibge}')">+ Adicionar Imobiliária</button>
      </div>
    </div>`;
  }).join('');
  
  updateStats();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportCSV() {
  let rows = ['IBGE,Município,UF,Regional,RE,Lote,População,INSS,CLT,Público,Qtd Bancos,Imobiliária,Telefone'];
  DATA.forEach(d => {
    const imobs = getImobs(d.ibge);
    const bancos = bankData[d.ibge] || '';
    if (imobs.length === 0) {
      rows.push(`${d.ibge},"${d.municipio}",${d.uf},${d.regional},${d.re},${d.lote},${d.pop},${d.inss},${d.clt},${d.publico},${bancos},,`);
    } else {
      imobs.forEach(im => {
        rows.push(`${d.ibge},"${d.municipio}",${d.uf},${d.regional},${d.re},${d.lote},${d.pop},${d.inss},${d.clt},${d.publico},${bancos},"${im.nome}","${im.telefone}"`);
      });
    }
  });
  const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `imobiliarias_expansao_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('CSV exportado com sucesso!');
}

function exportJSON() {
  const exportData = { imobiliarias: imobData, bancos: bankData };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `imobiliarias_progresso_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('Progresso salvo!');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported.imobiliarias && imported.bancos) {
        Object.assign(imobData, imported.imobiliarias);
        Object.assign(bankData, imported.bancos);
      } else {
        Object.assign(imobData, imported);
      }
      saveState();
      renderCards();
      showToast(`Progresso carregado!`);
    } catch(err) {
      showToast('Erro ao importar arquivo.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Populate filters
function populateFilters() {
  const ufs = [...new Set(DATA.map(d => d.uf))].sort();
  const regs = [...new Set(DATA.map(d => d.regional))].sort();
  const res = [...new Set(DATA.map(d => d.re))].sort();
  const lotes = [...new Set(DATA.map(d => d.lote))].sort((a,b) => +a - +b);
  
  const fUF = document.getElementById('filterUF');
  ufs.forEach(u => { const o = document.createElement('option'); o.value = u; o.textContent = u; fUF.appendChild(o); });
  
  const fReg = document.getElementById('filterRegional');
  regs.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; fReg.appendChild(o); });
  
  const fRE = document.getElementById('filterRE');
  res.forEach(r => { const o = document.createElement('option'); o.value = r; o.textContent = r; fRE.appendChild(o); });
  
  const fLote = document.getElementById('filterLote');
  lotes.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = `Lote ${l}`; fLote.appendChild(o); });
}

// Event listeners
['searchCity','filterUF','filterRegional','filterRE','filterLote','filterStatus'].forEach(id => {
  document.getElementById(id).addEventListener('input', renderCards);
  document.getElementById(id).addEventListener('change', renderCards);
});

// Função para alternar entre a visão da lista e a visão do mapa
function alternarMapa() {
    const divFiltros = document.querySelector('.filters');
    const divContainer = document.querySelector('.container');
    const divMapa = document.getElementById('container-mapa');
    
    // Se o mapa está escondido, nós mostramos o mapa e escondemos a lista
    if (divMapa.style.display === 'none') {
        divContainer.style.display = 'none';
        divFiltros.style.display = 'none'; // Esconde os filtros também para dar mais espaço
        divMapa.style.display = 'block';
    } else {
        // Se o mapa está aparecendo, nós escondemos o mapa e voltamos para a lista
        divContainer.style.display = 'block';
        divFiltros.style.display = 'flex';
        divMapa.style.display = 'none';
    }
} 
// Init
populateFilters();
renderCards();
</script>
</body>
</html>
